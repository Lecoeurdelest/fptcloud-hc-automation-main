# Pre-commit hooks for ruff (format + lint) and mypy --strict.
# Install once:   pre-commit install
# Run on demand:  pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-format
        args: [--check]
      - id: ruff
        args: [--no-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args: [--strict]
        files: ^src/
        additional_dependencies:
          - pydantic>=2.6
          - types-redis
          - structlog
          - click
